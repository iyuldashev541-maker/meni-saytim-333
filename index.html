<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: linear-gradient(135deg, #6366f1, #a855f7); width: 100%; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .item { background: #1e293b; padding: 25px 10px; border-radius: 15px; text-align: center; border: 1px solid #334155; cursor: pointer; font-weight: bold; }
        .item:active { transform: scale(0.95); background: #334155; }
        .emoji { font-size: 35px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>💰 Xarajatlar Bo'limi</h2>
        <p>Kategoriyani tanlang:</p>
    </div>
    <div class="grid">
        <div class="item" onclick="send('🍎 Oziq-ovqat')"><span class="emoji">🍎</span>Ovqat</div>
        <div class="item" onclick="send('🥤 Ichimliklar')"><span class="emoji">🥤</span>Ichimlik</div>
        <div class="item" onclick="send('🚕 Transport')"><span class="emoji">🚕</span>Yo'l kira</div>
        <div class="item" onclick="send('🏠 Ro'zg'or')"><span class="emoji">🏠</span>Ro'zg'or</div>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function send(cat) { tg.sendData(cat); }
    </script>
</body>
</html>
